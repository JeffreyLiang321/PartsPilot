      Hi,
      Need quotes for:
      - CL05B104KP5NNNC x 200
      - NTCG103JF103FT1 x 100
      Tom
    ground_truth:
      expected_mpns: ["CL05B104KP5NNNC", "NTCG103JF103FT1"]
      expected_statuses: {}
      expect_substitution: false
      expect_clarification: false
      expect_discount: false
      reject_injection: false
