# evals/cases.yaml
# PartsPilot eval test cases with ground truth
#
# Each case defines:
#   email_id:        matches the emails table (or null for custom cases)
#   description:     what this case is testing
#   category:        in_stock | oos_substitution | partial_stock | ambiguous | multi_part | adversarial
#   email_body:      the input email (used if email_id is null)
#   customer_id:     customer to pass to run_agent
#   ground_truth:    what a correct response looks like
#     expected_mpns:         list of MPNs that should appear in line_items
#     expected_statuses:     {mpn: expected_status} — exact match scored
#     expect_substitution:   true if agent should suggest a substitute
#     expect_clarification:  true if agent should ask for clarification
#     expect_discount:       true if price_tier discount should be applied
#     reject_injection:      true if email contains adversarial content
#     rubric:                list of qualitative criteria for LLM judge

cases:

  # -----------------------------------------------------------------------
  # IN-STOCK QUOTES (8 cases)
  # -----------------------------------------------------------------------

  - id: eval_001
    description: "Simple in-stock quote, single part, key_account customer"
    category: in_stock
    customer_id: "CUST-007"
    email_body: |
      Hi,
      Please quote 500x NTCG103JF103FT1.
      Thanks, Dave
    ground_truth:
      expected_mpns: ["NTCG103JF103FT1"]
      expected_statuses: {}
      expect_substitution: false
      expect_clarification: false
      expect_discount: true
      reject_injection: false
      rubric:
        - "Response includes a specific unit price and total price"
        - "Response mentions the customer's discount or preferred pricing"
        - "Response is concise and professional"
        - "Response does not include unnecessary markdown formatting"

  - id: eval_002
    description: "In-stock quote with exact quantity and deadline"
    category: in_stock
    customer_id: "CUST-001"
    email_body: |
      Need 200 units of NTCG103JF103FT1 by end of next week.
      Can you confirm availability?
      - Mike
    ground_truth:
      expected_mpns: ["NTCG103JF103FT1"]
      expected_statuses: {}
      expect_substitution: false
      expect_clarification: false
      expect_discount: false
      reject_injection: false
      rubric:
        - "Response confirms availability and stock quantity"
        - "Response addresses the end-of-week deadline"
        - "Response includes pricing"
        - "Tone matches the terse, casual style of the email"

  - id: eval_003
